name: Ejecutar script en Python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mensaje:
        description: 'Mensaje que quiero mostrar'
        required: true
        default: 'Hola desde input'
jobs:
  ejecutar-python:
    runs-on: ubuntu-latest

    env:
      APP_ENV: desarrollo
      API_KEY: ${{ secrets.API_KEY }}
      MENSAJE: ${{ inputs.mensaje }}
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar script
        run: python script.py
